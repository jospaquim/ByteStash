name: Deploy Personal ByteStash

on:
  push:
    branches: [ "main" ] # Se dispara al hacer push a main
  workflow_dispatch:      # Permite ejecución manual

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Preparado para los requisitos de GitHub 2026

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU for cross-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Soluciona el error de "Cache export is not supported"

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Construimos solo para amd64 y arm64 para evitar errores de memoria (OOM)[cite: 1, 2]
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/bytestash:latest
            ghcr.io/${{ github.repository_owner }}/bytestash:v1.6.0
          # Configuración de caché optimizada para GitHub Actions[cite: 1, 2]
          cache-from: type=gha
          cache-to: type=gha,mode=max
