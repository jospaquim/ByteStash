name: Deploy Personal ByteStash

on:
  workflow_dispatch: # 

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/bytestash:latest
            ghcr.io/${{ github.repository_owner }}/bytestash:v1.6.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
